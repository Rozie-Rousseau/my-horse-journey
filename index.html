<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rozella's Riding Journey</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
  <style>

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Lato', sans-serif;
      background: #faf6f0;
      color: #2c1810;
      font-weight: 300;
    }

    .hero {
      background: #2c1810;
      color: #faf6f0;
      text-align: center;
      padding: 70px 20px 50px;
    }
    .hero .eyebrow {
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #c9a87c;
      margin-bottom: 16px;
    }
    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: 52px;
      font-weight: 400;
      letter-spacing: 1px;
      margin-bottom: 16px;
    }
    .hero-line {
      width: 60px;
      height: 1px;
      background: #c9a87c;
      margin: 0 auto 16px;
    }
    .hero .subtitle {
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #c9a87c;
    }

    nav {
      background: #3d2314;
      display: flex;
      justify-content: center;
      gap: 40px;
      padding: 16px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    nav a {
      color: #c9a87c;
      font-size: 11px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      text-decoration: none;
      font-weight: 400;
      transition: color 0.2s;
    }
    nav a:hover { color: #faf6f0; }

    .about {
      display: flex;
      align-items: center;
      gap: 48px;
      max-width: 780px;
      margin: 64px auto;
      padding: 0 32px;
    }
    .about-img {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      object-fit: cover;
      object-position: center top;
      border: 4px solid #c9a87c;
      flex-shrink: 0;
    }
    .about h2 {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      font-weight: 400;
      margin-bottom: 12px;
      color: #2c1810;
    }
    .about p {
      font-size: 16px;
      line-height: 1.9;
      color: #6b4c2a;
    }

    .section-title {
      text-align: center;
      margin: 20px 0 36px;
    }
    .section-title h2 {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      font-weight: 400;
      color: #2c1810;
    }
    .section-title .line {
      width: 50px;
      height: 1px;
      background: #c9a87c;
      margin: 14px auto 0;
    }

    .timeline {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }

    .chapter {
      background: #fff8f2;
      border: 0.5px solid #d4b896;
      border-radius: 12px;
      margin-bottom: 14px;
      overflow: hidden;
    }
    .chapter-header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 22px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .chapter-header:hover { background: #f5ede0; }

    .year-badge {
      background: #c9a87c;
      color: #2c1810;
      font-size: 13px;
      font-weight: 400;
      padding: 6px 14px;
      border-radius: 99px;
      letter-spacing: 1px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .chapter-info { flex: 1; }
    .chapter-info h3 {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-weight: 400;
      color: #2c1810;
      margin-bottom: 3px;
    }
    .chapter-info span {
      font-size: 12px;
      color: #9b7040;
      letter-spacing: 0.5px;
